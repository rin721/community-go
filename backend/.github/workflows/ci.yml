name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

permissions:
  contents: read

jobs:
  verify:
    name: Go verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.22.0 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/app/pnpm-lock.yaml

      - name: Install WebUI dependencies
        run: pnpm -C web/app install --frozen-lockfile

      - name: Check repository governance gates
        shell: pwsh
        run: |
          ./scripts/check-agent-skills.ps1
          ./scripts/check-doc-readmes.ps1
          ./scripts/check-doc-links.ps1
          ./scripts/check-entry-brand-convergence.ps1
          ./scripts/check-plugin-removal.ps1
          ./scripts/check-deployment-guardrails.ps1
          ./scripts/check-open-source-readiness.ps1

      - name: Check Go formatting
        run: |
          files="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$files" ]; then
            echo "Go files that would change with gofmt:"
            echo "$files"
            exit 1
          else
            echo "All Go files are gofmt formatted."
          fi

      - name: Run tests
        run: go test ./... -count=1 -mod=readonly

      - name: Build server
        run: go build -mod=readonly -o /tmp/console-server ./cmd/console

      - name: Lint WebUI i18n
        run: pnpm -C web/app lint:i18n

      - name: Lint WebUI
        run: pnpm -C web/app lint

      - name: Typecheck WebUI
        run: pnpm -C web/app typecheck

      - name: Test WebUI
        run: pnpm -C web/app test:unit

      - name: Build WebUI
        run: pnpm -C web/app build

      - name: Build Docker image
        run: docker build -t console-platform:ci .

      - name: Smoke Docker container
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/reports
          bash scripts/docker-smoke.sh --skip-build --image console-platform:ci --container console-platform-ci-smoke 2>&1 | tee build/reports/docker-smoke-ci.log

      - name: Upload Docker smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-smoke-evidence
          path: build/reports/docker-smoke-ci.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Check whitespace
        run: git diff --check
