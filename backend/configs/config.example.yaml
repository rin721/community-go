# Local development example. Copy to configs/config.yaml for a runnable
# SQLite + local cache + local storage setup.

server:
  host: 127.0.0.1
  port: 9999
  mode: debug
  read_timeout: 10
  write_timeout: 10
  idle_timeout: 30

webui:
  enabled: true
  mount_path: /
  dist_dir: ./web/app/build/client
  public_base_url: /

rpc:
  enabled: false
  host: 127.0.0.1
  port: 10099
  read_timeout: 10
  write_timeout: 10
  idle_timeout: 30

database:
  driver: sqlite
  sqlite:
    path: ./data/app.db
  mysql:
    host: 127.0.0.1
    port: 3306
    username: root
    password: example
    database: console_platform
    charset: utf8mb4
  postgres:
    host: 127.0.0.1
    port: 5432
    username: postgres
    password: example
    database: console_platform
    sslMode: disable
  pool:
    maxOpenConns: 1
    maxIdleConns: 1

cache:
  driver: local
  local:
    maxCost: 67108864
    numCounters: 1000000
    bufferItems: 64
    defaultTtlSeconds: 0
  redis:
    addr: 127.0.0.1:6379
    username: ""
    password: ""
    db: 0
    poolSize: 10
    minIdleConns: 2
    maxRetries: 2
    dialTimeout: 5
    readTimeout: 3
    writeTimeout: 3

logger:
  level: info
  format: console
  console_format: console
  file_format: json
  output: stdout
  file_path: ./logs/app.log
  max_size: 100
  max_backups: 7
  max_age: 30

i18n:
  defaultLocale: zh-CN
  fallbackLocale: zh-CN
  supportedLocales:
    - zh-CN
    - en-US
  resources:
    ui: ./configs/locales/ui
    api: ./configs/locales/api
    validation: ./configs/locales/validation
    system: ./configs/locales/system

brand:
  productName: Console Platform
  productCode: console-platform
  versionName: Community

executor:
  enabled: true
  pools:
    - name: background
      size: 8
      expiry: 30
      non_blocking: true

storage:
  driver: local
  local:
    fsType: basepath
    basePath: ./data/uploads
    publicUrl: /uploads
    enableWatch: false
    watchBufferSize: 100
  s3:
    endpoint: https://s3.example.com
    region: us-east-1
    bucket: console-platform
    accessKeyId: example
    secretAccessKey: example
    usePathStyle: true
    publicBaseUrl: ""
  minio:
    endpoint: http://127.0.0.1:9000
    region: us-east-1
    bucket: console-platform
    accessKeyId: example
    secretAccessKey: example
    usePathStyle: true
    publicBaseUrl: ""

system:
  seed_defaults_on_start: true
  maintenance_cleanup_interval_seconds: 60
  maintenance_cleanup_batch_size: 100

cors:
  enabled: true
  allow_origins:
    - http://localhost:3000
    - http://127.0.0.1:3000
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allow_headers:
    - Origin
    - Content-Type
    - X-Request-ID
    - Authorization
    - X-Locale
    - X-Setup-Token
    - X-CSRF-Token
    - X-Community-CSRF-Token
  expose_headers:
    - X-Request-ID
  allow_credentials: true
  max_age: 3600

auth:
  enabled: true
  registration_mode: direct
  issuer: console-platform
  audience:
    - console-platform-api
  signing_key: ${AUTH_SIGNING_KEY:dev-signing-key-change-me-32-bytes}
  access_token_ttl_seconds: 900
  refresh_token_ttl_seconds: 604800
  refresh_token_pepper: ${AUTH_REFRESH_TOKEN_PEPPER:dev-refresh-pepper-change-me-32}
  cookie:
    name_prefix: console
    domain: ""
    path: /
    same_site: lax
    secure: false
  csrf:
    enabled: true
    cookie_name: console_csrf
    header_name: X-CSRF-Token
  session:
    single_per_product_platform: true
    product_header: X-Product-Code
    client_type_header: X-Client-Type
    default_client_type: pc_web
    mobile_user_agent_hints:
      - mobile
      - android
      - iphone
      - ipad
  cache:
    enabled: true
    user_ttl_seconds: 120
    org_ttl_seconds: 120
    role_ttl_seconds: 120
    permission_ttl_seconds: 300
  mfa_issuer: console-platform
  mfa_secret_key: ${AUTH_MFA_SECRET_KEY:dev-mfa-secret-key-change-me-32-bytes}
  login_max_failures: 5
  login_lock_minutes: 15
  login_captcha_enabled: false
  captcha_ttl_seconds: 120
  invitation_ttl_seconds: 86400
  email_verification_ttl_seconds: 86400
  password_reset_ttl_seconds: 1800
  notification_driver: debug
  notification_retry_interval_seconds: 60
  notification_retry_batch_size: 20
  notification_retry_max_attempts: 5
  smtp:
    host: 127.0.0.1
    port: 1025
    username: mailer
    password: example-smtp-password
    from: no-reply@example.invalid
    from_name: ${BRAND_PRODUCT_NAME:Console Platform}
    security: none
  password_policy:
    min_length: 8
    require_lower: false
    require_upper: false
    require_number: false
    require_symbol: false
  casbin_reload_interval_seconds: 300

community:
  auth:
    access_token_ttl_seconds: 900
    refresh_token_ttl_seconds: 604800
    default_client_type: community_web
    cookie:
      name_prefix: community
      domain: ""
      path: /
      same_site: lax
      secure: false
    csrf:
      enabled: true
      cookie_name: community_csrf
      header_name: X-Community-CSRF-Token
  video:
    mode: local
    worker:
      enabled: true
      pollIntervalSeconds: 5
      batchSize: 2
      leaseTimeoutSeconds: 1800
      maxAttempts: 3
      retryDelaySeconds: 60
      executorPool: background
      dispatchTimeoutSeconds: 30
      callbackMaxSkewSeconds: 600
    local:
      ffmpegPath: ffmpeg
      ffprobePath: ffprobe
      sourceRoot: community/sources
      outputRoot: community/hls
      publicBaseUrl: /api/v1/public/community/hls
    hls:
      segmentSeconds: 6
      renditions:
        - label: 360p
          width: 640
          height: 360
          videoKbps: 800
          audioKbps: 96
        - label: 720p
          width: 1280
          height: 720
          videoKbps: 2800
          audioKbps: 128
        - label: 1080p
          width: 1920
          height: 1080
          videoKbps: 5000
          audioKbps: 160
    cloud:
      provider: ""
      objectStorage: ""
      bucket: ""
      cdnBaseUrl: ""
      dispatchUrl: ""
      dispatchSecret: ""
      callbackBaseUrl: ""
      callbackSecret: ""

migration:
  auto_apply: true
  dir: ./internal/migrations

env_override:
  disabled_paths: []
