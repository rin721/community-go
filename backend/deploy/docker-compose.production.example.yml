      - ${HOST_CONFIG_FILE:?set HOST_CONFIG_FILE}:/app/configs/config.yaml:ro
      - ${HOST_DATA_DIR:?set HOST_DATA_DIR}:/app/data
      - ${HOST_LOGS_DIR:?set HOST_LOGS_DIR}:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${APP_CONTAINER_PORT:-${APP_SERVER_PORT:-9999}}/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    read_only: false
