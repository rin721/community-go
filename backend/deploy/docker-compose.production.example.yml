services:
  console-platform:
    image: ${DEPLOY_IMAGE:?set DEPLOY_IMAGE}
    container_name: ${DEPLOY_CONTAINER_NAME:-console-platform}
    restart: unless-stopped
    init: true
    stop_grace_period: ${APP_CONTAINER_STOP_GRACE_PERIOD:-30s}
    cpus: ${APP_CONTAINER_CPUS:-1.0}
    mem_limit: ${APP_CONTAINER_MEMORY_LIMIT:-512m}
    pids_limit: ${APP_CONTAINER_PIDS_LIMIT:-256}
    ports:
      - "${APP_PORT:-9999}:${APP_CONTAINER_PORT:-${APP_SERVER_PORT:-9999}}"
    environment:
      CONFIG_PATH: /app/configs/config.yaml
      APP_DB_DRIVER: ${APP_DB_DRIVER:-}
      APP_DB_SQLITE_PATH: ${APP_DB_SQLITE_PATH:-}
      APP_DB_MYSQL_HOST: ${APP_DB_MYSQL_HOST:-}
