      APP_DB_MYSQL_USERNAME: ${APP_DB_MYSQL_USERNAME:-}
      APP_DB_MYSQL_PASSWORD: ${APP_DB_MYSQL_PASSWORD:-}
      APP_DB_MYSQL_DATABASE: ${APP_DB_MYSQL_DATABASE:-}
      APP_DB_MYSQL_CHARSET: ${APP_DB_MYSQL_CHARSET:-}
      APP_DB_POSTGRES_HOST: ${APP_DB_POSTGRES_HOST:-}
      APP_DB_POSTGRES_PORT: ${APP_DB_POSTGRES_PORT:-}
      APP_DB_POSTGRES_USERNAME: ${APP_DB_POSTGRES_USERNAME:-}
      APP_DB_POSTGRES_PASSWORD: ${APP_DB_POSTGRES_PASSWORD:-}
      APP_DB_POSTGRES_DATABASE: ${APP_DB_POSTGRES_DATABASE:-}
      APP_DB_POSTGRES_SSL_MODE: ${APP_DB_POSTGRES_SSL_MODE:-}
      APP_DB_POOL_MAX_OPEN_CONNS: ${APP_DB_POOL_MAX_OPEN_CONNS:-}
      APP_DB_POOL_MAX_IDLE_CONNS: ${APP_DB_POOL_MAX_IDLE_CONNS:-}
      APP_CACHE_DRIVER: ${APP_CACHE_DRIVER:-}
      APP_CACHE_LOCAL_MAX_COST: ${APP_CACHE_LOCAL_MAX_COST:-}
      APP_CACHE_LOCAL_NUM_COUNTERS: ${APP_CACHE_LOCAL_NUM_COUNTERS:-}
      APP_CACHE_LOCAL_BUFFER_ITEMS: ${APP_CACHE_LOCAL_BUFFER_ITEMS:-}
      APP_CACHE_LOCAL_DEFAULT_TTL_SECONDS: ${APP_CACHE_LOCAL_DEFAULT_TTL_SECONDS:-}
      APP_CACHE_REDIS_ADDR: ${APP_CACHE_REDIS_ADDR:-}
